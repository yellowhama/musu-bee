<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUSU Remote Desktop</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    color: #fff;
    font-family: monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #status {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.8);
    padding: 8px 16px;
    font-size: 13px;
    text-align: center;
    z-index: 100;
    transition: opacity 0.3s;
  }
  #status.connected { opacity: 0; }
  #vnc-container {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
  }
  #vnc-container canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: default;
  }
</style>
</head>
<body>
<div id="status">Connecting to MUSU Remote Desktop...</div>
<div id="vnc-container"></div>

<script type="module">
import RFB from './core/rfb.js';

const params = new URLSearchParams(window.location.search);
const token = params.get('token') || '';
const statusEl = document.getElementById('status');
const container = document.getElementById('vnc-container');

function setStatus(msg, isError) {
  statusEl.textContent = msg;
  statusEl.style.color = isError ? '#ff6b6b' : '#aaa';
  statusEl.classList.remove('connected');
}

if (!token) {
  setStatus('Error: no token provided in URL', true);
} else {
  const host = window.location.hostname;
  const port = window.location.port;
  const proto = window.location.protocol === 'https:' ? 'wss' : 'ws';
  const wsUrl = `${proto}://${host}:${port}/api/screen/ws-vnc?token=${encodeURIComponent(token)}`;

  setStatus(`Connecting to ${host}...`);

  const rfb = new RFB(container, wsUrl, {
    wsProtocols: ['binary'],
  });

  rfb.scaleViewport = true;
  rfb.resizeSession = false;
  rfb.viewOnly = false;

  rfb.addEventListener('connect', () => {
    setStatus('Connected', false);
    statusEl.classList.add('connected');
  });

  rfb.addEventListener('disconnect', (e) => {
    const reason = e.detail?.reason || 'unknown';
    const clean = e.detail?.clean;
    setStatus(
      clean ? 'Disconnected' : `Disconnected: ${reason}`,
      !clean
    );
    statusEl.classList.remove('connected');
  });

  rfb.addEventListener('credentialsrequired', () => {
    rfb.sendCredentials({ password: '' });
  });

  rfb.addEventListener('securityfailure', (e) => {
    setStatus(`Security failure: ${e.detail?.reason || 'auth rejected'}`, true);
  });
}
</script>
</body>
</html>
