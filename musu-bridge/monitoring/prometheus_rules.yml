groups:
  - name: musu_agent_alerts
    rules:
      - alert: AgentTaskP99High
        expr: histogram_quantile(0.99, rate(agent_task_duration_seconds_bucket[5m])) > 600
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Agent task P99 latency high"
          description: "P99 task duration > 600s for 2 minutes"
      - alert: ZombieRateHigh
        expr: rate(task_stuck_total{reason="zombie"}[1m]) > 0.1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High zombie task rate"
          description: "Zombie task rate > 0.1/min for 1 minute"
