groups:
  - name: musu_agent_alerts
    rules:
      - alert: AgentTaskP99High
        expr: histogram_quantile(0.99, rate(agent_task_duration_seconds_bucket[5m])) > 600
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Agent task P99 latency high"
          description: "P99 task duration > 600s for 5 minutes"
      - alert: ZombieRateHigh
        expr: rate(agent_tasks_total{status="zombie_rejected"}[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High zombie task rejection rate"
          description: "Zombie rejection rate > 0.1/min for 5 minutes"
