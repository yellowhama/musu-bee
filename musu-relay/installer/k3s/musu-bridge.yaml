# musu-bridge K3s manifest — V23.3 A1.b (wiki/382)
#
# Bakes the four objects that K3s's manifest-controller auto-applies on first
# boot from /var/lib/rancher/k3s/server/manifests/. Multi-doc YAML in apply
# order: Namespace, ConfigMap, Deployment, Service. The Secret is NOT here —
# musu-init runtime-generates `musu-bridge-token` (see musu-init step 3.5) so
# that the token value persists across `wsl --terminate` via the K3s sqlite
# datastore but is unique per `wsl --import`.
#
# ── Image pin ────────────────────────────────────────────────────────────────
# Image: docker.io/library/musu-bridge@sha256:ad3097…aabb4626
# Digest source: musu-relay/installer/manifest.yaml:58 (`bridge_image_digest`,
# baked by A1.a / wiki/381). Containerd resolves this digest against the
# airgap-loaded image at /var/lib/rancher/k3s/agent/images/musu-bridge-v0.1.0.tar
# on first import; imagePullPolicy=IfNotPresent guarantees no remote pull.
#
# Critic C-A1b-H6: the image: field uses the FULLY-QUALIFIED reference
# `docker.io/library/musu-bridge@sha256:…`, NOT the bare `musu-bridge@sha256:…`.
# Containerd's image resolver normalizes user-supplied refs to FQ form when
# walking the local content store; a bare ref MAY miss the airgap-loaded image
# keyed under `docker.io/library/...`. Manual smoke test (§7.6) MUST run
# `crictl --runtime-endpoint unix:///run/k3s/containerd/containerd.sock images`
# and confirm the locally-loaded ref matches the manifest's image: field.
#
# ── Security context ────────────────────────────────────────────────────────
# Pod spec carries the full hardening profile from wiki/381 §7 + FO-A1a-2:
#   runAsUser/Group/fsGroup=1000     (matches Dockerfile USER musu)
#   runAsNonRoot=true                 (defense-in-depth)
#   seccompProfile=RuntimeDefault     (block uncommon syscalls)
#   automountServiceAccountToken=false (bridge does NOT call k8s API)
#   readOnlyRootFilesystem=true       (writes go to mounted volumes only)
#   allowPrivilegeEscalation=false    (no setuid)
#   capabilities.drop=[ALL]           (no extra Linux caps)
#
# ── /health probe semantics (H3) ────────────────────────────────────────────
# musu-bridge's /health endpoint returns JSON `{"status":"ok","worker":<bool>,…}`
# (server.py:2974-3008). In A1.b's bridge-only image (no musu-worker sidecar)
# the `worker` field is ALWAYS `false` — this is steady state, NOT a defect.
# The livenessProbe below uses HTTP 200 status code ONLY; it MUST NOT key on
# body.worker. Future operators: if you "fix" /health to require worker:true,
# you will produce a CrashLoopBackOff cascade on every Pod start.
#
# Reference: wiki/381 §3 finding B-A1.a-5 (spec drift), wiki/381 §7
# forward-pointer (liveness keyed on HTTP status only).
#
# ── terminationGracePeriodSeconds=45 ───────────────────────────────────────
# Derived from server.py:930-974 graceful-shutdown loop:
#   :930-934   30s drain for in-flight task termination
#   :947-952   10s controller stop
#   :967-974    5s relay-task timeout
# Total 45s. Sized to match the host-systemd TimeoutStopSec contract at
# scripts/systemd/musu-bridge.service.
#
# Critic C-A1b-H5: with `strategy: Recreate`, this means up to a 45s service
# gap on every Pod update (P50 ~10s with no active tasks; P99 up to 45s with
# active tasks). musu-bee callers (default MUSU_BRIDGE_URL=http://localhost:8070)
# will see connection-refused during this window. A1.c plan (wiki/384) §10.6
# owns mitigation (accept, reduce to 15s, or 2-replica coordination).
#
# ── manifest-controller behavior (INFO1) ───────────────────────────────────
# K3s's manifest-controller is APPLY-ONLY, NOT prune. Removing this file from
# /var/lib/rancher/k3s/server/manifests/ does NOT delete the objects from the
# cluster — operator must `kubectl delete -f musu-bridge.yaml` explicitly.
#
# ── kubectl edit clobber warning (L3) ──────────────────────────────────────
# `kubectl edit deploy -n musu musu-bridge` changes will be REVERTED on every
# K3s restart because the manifest-controller re-applies this baked YAML.
# Persistent edits must be made to this file in the musu-bee repo and a new
# musu-backend.tar must be re-imported. For ephemeral debugging only, use
# `kubectl scale deploy musu-bridge --replicas=0` and run the container
# manually via containerd.
#
# ── hostPath rationale ─────────────────────────────────────────────────────
# /home/musu/.musu (musu-state):
#   hostPath /var/lib/musu/state → pod /home/musu/.musu (RW)
#   Owner 1000:1000 mode 0770. fsGroup does NOT apply to hostPath, so musu-init
#   step 3.b creates the dir + chowns at first boot (Critic C-A1b-H1).
# /home/musu/.musu/account_key (account-key):
#   hostPath /etc/musu (dir, RO) + subPath account_key → pod
#   /home/musu/.musu/account_key
#   musu-init step 3.5 chmods host file to 0644 root:root so uid-1000 pod can
#   read it (Critic C-A1b-H4). Single-tenant WSL2 appliance: world-readable
#   inside the distro filesystem is acceptable because the distro itself is
#   isolated under %LOCALAPPDATA%\Packages\... on the Windows operator host.
#
---
apiVersion: v1
kind: Namespace
metadata:
  name: musu
  labels:
    app.kubernetes.io/managed-by: musu-backend-tar
    app.kubernetes.io/version: v0.1.0
    app.kubernetes.io/part-of: musu
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: musu-bridge-config
  namespace: musu
  labels:
    app: musu-bridge
data:
  # MUSU_ENV=production activates the ≥32-char MUSU_BRIDGE_TOKEN gate at
  # musu-bridge/server.py:208-217 (post-S-A1a-H2 fix). The Secret value
  # generated by musu-init (`head -c 32 /dev/urandom | od -An -tx1`) is 64
  # hex chars so the gate is satisfied informational, not blocking.
  MUSU_ENV: "production"
  # Bind 0.0.0.0:8070 inside the Pod; the Service (below) exposes ClusterIP.
  # A1.b does NOT add host-port surface (Critic H4 / §10.1 deferral to A1.c).
  BRIDGE_HOST: "0.0.0.0"
  BRIDGE_PORT: "8070"
  # Dockerfile already sets PYTHONUNBUFFERED=1; re-asserted here for visibility
  # in `kubectl describe configmap` introspection.
  PYTHONUNBUFFERED: "1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: musu-bridge
  namespace: musu
  labels:
    app: musu-bridge
    app.kubernetes.io/name: musu-bridge
    app.kubernetes.io/version: v0.1.0
spec:
  # Critic C-A1b-H3: replicas: 0 at apply time. musu-init step 3.5 scales to 1
  # AFTER (a) the Secret musu-bridge-token is created AND (b) /etc/musu/account_key
  # has been chmodded to 0644. Without this gate the Pod would CrashLoopBackOff
  # with kubelet exponential backoff stretching the cold-start gap to ~5 min.
  replicas: 0
  # Single-replica stateful (hostPath state). Recreate prevents a rolling
  # update from racing two Pods on the same /var/lib/musu/state dir, which
  # would corrupt the sqlite DB at ~/.musu/db/musu.db.
  # Trade-off (Critic C-A1b-H5): up to terminationGracePeriodSeconds (=45s)
  # of service unavailability per update. See header comment block + wiki/382
  # §10.6 for A1.c mitigation plan.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: musu-bridge
  template:
    metadata:
      labels:
        app: musu-bridge
        app.kubernetes.io/name: musu-bridge
        app.kubernetes.io/version: v0.1.0
    spec:
      # Pod-level security context (wiki/381 §7 + FO-A1a-2).
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      # Bridge does not call the k8s API; suppress SA token mount.
      automountServiceAccountToken: false
      # 30 (task drain) + 10 (controller stop) + 5 (relay-task timeout) = 45s.
      # Cite: musu-bridge/server.py:930-974.
      terminationGracePeriodSeconds: 45
      containers:
        - name: musu-bridge
          # Critic C-A1b-H6: FULLY-QUALIFIED ref. Digest pinned to A1.a OCI
          # archive (manifest.yaml:58). Containerd resolver may not match a
          # bare `musu-bridge@sha256:…` against the airgap-loaded image keyed
          # under `docker.io/library/...`.
          image: docker.io/library/musu-bridge@sha256:b484bde2814d53893fc41103d21001e1f9842946693cc63d15ada6856640755b
          # Never pull from remote — image is airgap-loaded at first import.
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8070
              protocol: TCP
          envFrom:
            - configMapRef:
                name: musu-bridge-config
            - secretRef:
                # Runtime-generated by musu-init step 3.5 (NOT baked into the
                # tar). 64 hex chars from /dev/urandom; persists across
                # `wsl --terminate` via K3s sqlite datastore at
                # /var/lib/rancher/k3s/server/db/state.db.
                name: musu-bridge-token
          # Container-level security context (stacks on pod-level fsGroup etc.).
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: musu-state
              mountPath: /home/musu/.musu
            - name: account-key
              mountPath: /home/musu/.musu/account_key
              subPath: account_key
              readOnly: true
          # Cold-start budget: ~3-5s typical (server.py:407-951 lifespan:
          # DB init + relay client connect + controller-manager start), 60s
          # hard budget here. startupProbe gates liveness/readiness per k8s
          # semantics (livenessProbe is suppressed until startupProbe passes).
          startupProbe:
            httpGet:
              path: /health
              port: 8070
            failureThreshold: 30
            periodSeconds: 2
          # HTTP 200 only — DO NOT body-parse. `worker:false` is steady-state
          # in the bridge-only image (no musu-worker sidecar). See header.
          livenessProbe:
            httpGet:
              path: /health
              port: 8070
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          # /health/ready verifies DB-init completed; ~3-5s after Pod Ready
          # under normal cold-start path (per Researcher M6).
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8070
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          # Parallel host-systemd contract:
          #   CPUQuota=50%   → limits.cpu = 500m (50% of one core)
          #   MemoryMax=2048M → limits.memory = 2048Mi
          # Cite: scripts/systemd/musu-bridge.service:24-25.
          # A1.c capacity bench (Const VI) may refine.
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "2048Mi"
      volumes:
        # readOnlyRootFilesystem=true demands a writable /tmp for FastAPI /
        # uvicorn scratch (e.g., multipart upload buffering). 256Mi sizeLimit
        # per Critic C-A1b-M3 (bumped from 64Mi to absorb FastAPI usage).
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        # ~/.musu/ writable state (DB, account_key target dir, telemetry
        # spool). hostPath at /var/lib/musu/state owned 1000:1000 0770 by
        # musu-init step 3.b. DirectoryOrCreate is belt-and-suspenders — the
        # init script already mkdir's it before scaling the Deployment up.
        - name: musu-state
          hostPath:
            path: /var/lib/musu/state
            type: DirectoryOrCreate
        # /etc/musu/account_key (host file, written 0600 root:root by
        # musu-write-key, chmodded to 0644 root:root by musu-init step 3.5).
        # Mounted as a directory + subPath so the pod sees a single FILE at
        # /home/musu/.musu/account_key, which is compatible with
        # readOnlyRootFilesystem (subPath bind-mounts are honored as RO leaves
        # under a RO root).
        - name: account-key
          hostPath:
            path: /etc/musu
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: musu-bridge
  namespace: musu
  labels:
    app: musu-bridge
spec:
  # A1.b: ClusterIP only (Pod-internal). Host-port surface (NodePort,
  # hostPort, or sidecar reverse proxy) is owned by A1.c / wiki/384 — see
  # wiki/382 §10.1 for collision considerations against the host-systemd
  # bridge on the same port 8070.
  type: ClusterIP
  selector:
    app: musu-bridge
  ports:
    - name: http
      port: 8070
      targetPort: 8070
      protocol: TCP
