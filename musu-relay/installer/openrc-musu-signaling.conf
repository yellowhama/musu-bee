#!/sbin/openrc-run
# musu-relay/installer/openrc-musu-signaling.conf
# V23.4 T2-F (wiki/433). Installed ONLY on rendezvous PC at
# /etc/init.d/musu-signaling.
#
# Boot model (per OQ-CRIT-4 resolving Critic M1):
# musu-signaling is NOT in the default runlevel. The musu-init script (in
# musu-backend.tar) starts this service AFTER `rc-service musu-gateway start`
# returns success AND MUSU_IS_RENDEZVOUS=true is set in gateway.env. This
# avoids the race where signaling tries to bind before networking is fully
# up and avoids stuck-boot on non-rendezvous peer PCs that have the service
# file installed but should not run it.

name="musu-signaling"
description="musu self-hosted WebRTC signaling rendezvous (V23.4 T2-F)"

command="/usr/bin/node"
command_args="/usr/local/lib/musu-signaling/dist/signaling/user-server.js"

command_user="root"
command_background=true
pidfile="/run/${RC_SVCNAME}.pid"
output_log="/var/log/musu-signaling.log"
error_log="/var/log/musu-signaling.log"

depend() {
    need net localmount
}
