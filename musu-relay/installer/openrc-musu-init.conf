#!/sbin/openrc-run
# OpenRC service for musu-init — V23.2 Workstream B4a (wiki/370 §6.2)
# Installed at: /etc/init.d/musu-init
# The ONLY service symlinked under /etc/runlevels/default/ (Critic C2 HIGH).
# K3s + musu-gateway are started BY musu-init in sequence, never directly.

name="musu-init"
description="musu-backend boot orchestrator (starts K3s, awaits account_key, starts gateway)"

command="/usr/local/bin/musu-init"
command_background=true
pidfile="/run/${RC_SVCNAME}.pid"
output_log="/var/log/musu-init.log"
error_log="/var/log/musu-init.log"

depend() {
    need net localmount
}
