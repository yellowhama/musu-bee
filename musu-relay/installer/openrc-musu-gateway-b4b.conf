#!/sbin/openrc-run
# OpenRC service for musu-gateway — V23.2 Workstream B4b (wiki/372 §14 C5)
# Drop-in replacement for B4a's openrc-musu-gateway.conf, atomic-installed
# at /etc/init.d/musu-gateway by install-wsl2.ps1 step 7 (full-file
# tmp+mv replace; NO `sed -i` per Critic C5 MEDIUM resolution).
#
# Byte-identical to musu-relay/installer/openrc-musu-gateway.conf EXCEPT
# the `command_args` line below now points at `main.js` (the B4b entry-
# point with install_completed telemetry emission) instead of `client.js`.
# Critic HIGH #1 (C1) resolution: main.ts lives at src/gateway/main.ts so
# `npm run build` compiles it to dist/gateway/main.js, which B4a's
# `cp -r dist/gateway` step bakes into the tar automatically.
#
# Critic C2 (HIGH) on B4a re-applies here: NO `depend() { need k3s; }`
# line. OpenRC's `need k3s` would only ensure K3s was *started*, not that
# its API is *Ready*, and it would not wait for /etc/musu/account_key.
# The musu-init orchestrator handles both readiness gates before this
# service is asked to start.

name="musu-gateway"
description="musu-relay gateway (WebRTC, talks to musu.pro signaling)"

command="/usr/bin/node"
command_args="/usr/local/lib/musu-gateway/dist/gateway/main.js"

# Gateway runs as root because /etc/musu/account_key is 0600 root:root
# (musu-write-key writes it that way). musu-backend.tar is an appliance
# distro and the WSL default user is root via /etc/wsl.conf.
command_user="root"

command_background=true
pidfile="/run/${RC_SVCNAME}.pid"
output_log="/var/log/musu-gateway.log"
error_log="/var/log/musu-gateway.log"

# Intentionally no `depend() { need k3s; }` — see header. Net + localmount
# are inherited from the parent (musu-init starts this service only after
# K3s Ready and account_key existence are both proven).
depend() {
    need net localmount
}
