# musu-backend.tar build manifest — V23.2 Workstream B4a (wiki/370)
#
# Source of truth for `build-musu-backend.sh`. CLI `--k3s-version` overrides
# this file's k3s_version; everything else is read directly from here.
#
# Flat YAML (key: value) intentionally — build-musu-backend.sh reads with a
# tiny awk parser, not a full YAML library. Do NOT introduce nested mappings
# without updating the parser.

alpine_version: "3.19"

# K3s patch pin. Bump when upstream cuts a new 1.30.x; verify checksums
# (k3s_binary_sha256, k3s_airgap_amd64_sha256) against the GitHub release
# before merging. CLI --k3s-version on build-musu-backend.sh overrides this.
k3s_version: "v1.30.4"

# Node version pin — resolved from Alpine 3.19's apk package set. Alpine
# 3.19 ships nodejs at the 20.x line.
node_version: "20.x"

# K3s artifact URLs (template variables ${K3S_VER}, ${ARCH} are substituted
# inside the build script; this file holds them in canonical form for human
# review).
k3s_binary_url:   "https://github.com/k3s-io/k3s/releases/download/${K3S_VER}+k3s1/k3s"
k3s_airgap_url:   "https://github.com/k3s-io/k3s/releases/download/${K3S_VER}+k3s1/k3s-airgap-images-${ARCH}.tar.zst"
k3s_install_url:  "https://get.k3s.io"

# Pinned checksums — enforced in build-musu-backend.sh step 2 since V23.3 B6
# (wiki/392 §4.1 S2.b). Bump in lockstep with k3s_version above. Values
# resolved from upstream sha256sum-${ARCH}.txt at
# https://github.com/k3s-io/k3s/releases/download/v${K3S_VER}+k3s1/sha256sum-${ARCH}.txt
# at the time of the version pin (current: v1.30.4+k3s1).
k3s_binary_sha256_amd64: "fb942b7870d9a88e10d063e9f52b99fa538becca761e2578887e04e5ce167e53"
k3s_binary_sha256_arm64: "5938c8d20b06ed7d425cf8d1520d2d1abd45f48c28dd9fbbb30c529255c24c1b"
k3s_airgap_sha256_amd64: "a9d6ede2a8fa4779b1b60b6a40f95a03b5b09a79edc2bbc6765b367e1f91ba90"
k3s_airgap_sha256_arm64: "f25cc2f5dcf9c697c7b1a88f8724e7600007e576eea8c6873593fb9cce2b88cf"

# V23.3 B6 reproducibility pins (wiki/392 §4.1 S1.b).
# Resolved by reading `apk search -x <pkg>` against the Alpine 3.19 main/
# community repos snapshot at build time. Bump these in lockstep with
# conscious upgrades only; floating versions break intra-hour byte-identity.
apk_alpine_base_version: "3.19.9-r0"
apk_nodejs_version: "20.15.1-r0"
apk_openrc_version: "0.52.1-r2"
