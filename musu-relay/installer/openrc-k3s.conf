#!/sbin/openrc-run
# OpenRC service for K3s — V23.2 Workstream B4a (wiki/370 §6.2)
# Installed at: /etc/init.d/k3s
# Started ONLY by musu-init — NOT symlinked under /etc/runlevels/default/.
# Critic C2 (HIGH) resolution: OpenRC's `need k3s` only ensures the service
# was *started*, not that the API is *Ready*. musu-init's explicit
# `kubectl get nodes | grep Ready` loop is the gate that prevents gateway
# crash-loop.

name="k3s"
description="K3s server (musu-backend)"

command="/usr/local/bin/k3s"
# Critic C3 (HIGH) resolution: K3s flags baked here.
#   --disable=traefik          B4a does not need the bundled ingress controller.
#                              Saves a few MB of pod startup.
#   --write-kubeconfig-mode    0644 lets musu-init/kubectl run as root and
#                              reads from /etc/rancher/k3s/k3s.yaml without
#                              the upstream-default 0600 lockout.
#   --snapshotter=native       overlayfs has known issues under WSL2 (the
#                              pre-Builder K3s-on-Alpine-WSL2 spike outcome).
#                              `native` is the documented workaround. If the
#                              operator's first validate-import.ps1 run shows
#                              K3s never goes Ready, the closure doc records
#                              the actual failure mode + any additional flags
#                              needed (e.g., --flannel-backend=host-gw).
command_args="server --disable=traefik --write-kubeconfig-mode=644 --snapshotter=native"

command_background=true
pidfile="/run/${RC_SVCNAME}.pid"
output_log="/var/log/k3s.log"
error_log="/var/log/k3s.log"

depend() {
    need net localmount
}
