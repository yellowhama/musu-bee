#!/sbin/openrc-run
# OpenRC service for musu-gateway — V23.2 B4a (wiki/370 §6.2) +
# V23.3 B7 (wiki/379 §2 B7 + wiki/394): converged b4b drop-in into the
# canonical conf. `command_args` now points at `main.js` (B4b entry-point
# with install_completed telemetry emission). The separate
# `openrc-musu-gateway-b4b.conf` drop-in was deleted in V23.3 B7; the
# install-wsl2.ps1 step 7 atomic-replace now sources THIS file as a
# defensive re-write (no-op when the tar is built post-B7).
#
# Installed at: /etc/init.d/musu-gateway
# Started ONLY by musu-init — NOT symlinked under /etc/runlevels/default/.
#
# Critic C2 (HIGH) on B4a resolution: NO `depend() { need k3s; }` line.
# OpenRC's `need k3s` would only ensure K3s was *started*, not that its API
# is *Ready*, and it would not wait for /etc/musu/account_key. The musu-init
# orchestrator handles both readiness gates before this service is asked to
# start.

name="musu-gateway"
description="musu-relay gateway (WebRTC, talks to musu.pro signaling)"

command="/usr/bin/node"
command_args="/usr/local/lib/musu-gateway/dist/gateway/main.js"

# Gateway runs as root because /etc/musu/account_key is 0600 root:root
# (musu-write-key writes it that way). musu-backend.tar is an appliance
# distro and the WSL default user is root via /etc/wsl.conf (Critic C6 MED).
command_user="root"

command_background=true
pidfile="/run/${RC_SVCNAME}.pid"
output_log="/var/log/musu-gateway.log"
error_log="/var/log/musu-gateway.log"

# Intentionally no `depend() { need k3s; }` — see header. Net + localmount
# are inherited from the parent (musu-init starts this service only after
# K3s Ready and account_key existence are both proven).
depend() {
    need net localmount
}
