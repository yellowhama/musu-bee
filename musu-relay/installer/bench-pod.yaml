# bench-pod.yaml — V23.3 A1.c / wiki/384
#
# Ephemeral one-shot Pod that benches musu-bridge's /health/ready endpoint
# from inside the K3s cluster (Pod -> Service -> Pod path; isolates substrate
# cost from the WSL2 vEthernet + portmap DNAT hops that Windows callers see).
#
# Spawned + torn down by musu-relay/installer/bridge-bench.sh on every run.
# restartPolicy:Never + automountServiceAccountToken:false + ALL caps dropped.
#
# Critic-resolved scope (wiki/384 §11):
#   - C-A1c-H1: bench orchestrator MUST set MUSU_DISABLE_RATE_LIMIT=1 on the
#     bridge Deployment BEFORE running this Pod, and revert after. Default
#     60 req/60s rate limit would saturate at the bench load (10 RPS * 5min).
#   - C-A1c-H2: bench Pod MUST send `Authorization: Bearer $TOKEN` on every
#     request (production-auth surface unchanged). Token sourced via
#     secretKeyRef from the musu-init-seeded `musu-bridge-token` Secret.
#   - C-A1c-H3: /api/route bench DROPPED (worker:false in A1 bridge-only image
#     breaks /api/route channel handlers; V23.4 forward-pointer when worker
#     sidecar containerizes). /health/ready ONLY.
#   - C-A1c-L7: percentile indexing uses statistics.quantiles(method='inclusive')
#     not naive `sorted[int(n*p/100)]`.
#
# Image reuse: python:3.11-slim is already in the airgap-loaded image set via
# the musu-bridge image lineage (A1.a). imagePullPolicy:IfNotPresent guarantees
# no remote pull.
---
apiVersion: v1
kind: Pod
metadata:
  name: musu-bridge-bench
  namespace: musu
  labels:
    app: musu-bridge-bench
    musu/sub-ws: v23.3-a1c
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  containers:
    - name: bench
      image: docker.io/library/python:3.11-slim
      imagePullPolicy: IfNotPresent
      env:
        - name: TARGET_BASE
          value: "http://musu-bridge.musu.svc.cluster.local:8070"
        - name: WARMUP_REQUESTS
          value: "100"
        - name: MEASURE_REQUESTS
          value: "3000"
        - name: TARGET_RPS
          value: "10"
        - name: MUSU_BRIDGE_TOKEN
          valueFrom:
            secretKeyRef:
              name: musu-bridge-token
              key: token
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        capabilities:
          drop:
            - ALL
      command: ["python", "-u", "-c"]
      args:
        - |
          import os, time, json, asyncio, statistics
          import urllib.request

          # Dual implementation: prefer aiohttp if available (better RPS pacing);
          # fall back to urllib.request for the python:3.11-slim base which does
          # not ship aiohttp. /health/ready at 10 RPS is well within urllib's
          # sync envelope so the fallback is production-equivalent here.
          try:
              import aiohttp
              HAS_AIOHTTP = True
          except ImportError:
              HAS_AIOHTTP = False

          BASE = os.environ["TARGET_BASE"]
          WARMUP = int(os.environ["WARMUP_REQUESTS"])
          MEASURE = int(os.environ["MEASURE_REQUESTS"])
          RPS = int(os.environ["TARGET_RPS"])
          TOKEN = os.environ["MUSU_BRIDGE_TOKEN"]
          AUTH = {"Authorization": "Bearer " + TOKEN}

          def pct(sorted_lats, p):
              # C-A1c-L7: percentile via statistics.quantiles(method='inclusive').
              if not sorted_lats:
                  return None
              if len(sorted_lats) < 2:
                  return sorted_lats[0]
              q = statistics.quantiles(sorted_lats, n=100, method='inclusive')
              return q[p - 1]  # p=50 -> q[49]; p=99 -> q[98]

          async def bench_path_aio(session, path, n, rps):
              latencies = []
              successes = 0
              failures = 0
              interval = 1.0 / rps
              for _ in range(n):
                  t0 = time.perf_counter()
                  try:
                      async with session.get(
                              BASE + path, headers=AUTH,
                              timeout=aiohttp.ClientTimeout(total=10)) as r:
                          await r.read()
                          if r.status == 200:
                              successes += 1
                          else:
                              failures += 1
                          latencies.append((time.perf_counter() - t0) * 1000.0)
                  except Exception:
                      failures += 1
                  elapsed = time.perf_counter() - t0
                  if elapsed < interval:
                      await asyncio.sleep(interval - elapsed)
              latencies.sort()
              return {"path": path, "n": n,
                      "success": successes, "fail": failures,
                      "p50_ms": pct(latencies, 50),
                      "p95_ms": pct(latencies, 95),
                      "p99_ms": pct(latencies, 99),
                      "max_ms": latencies[-1] if latencies else None}

          def bench_path_urllib(path, n, rps):
              latencies = []
              successes = 0
              failures = 0
              interval = 1.0 / rps
              for _ in range(n):
                  req = urllib.request.Request(BASE + path, headers=AUTH)
                  t0 = time.perf_counter()
                  try:
                      with urllib.request.urlopen(req, timeout=10) as r:
                          r.read()
                          if r.status == 200:
                              successes += 1
                          else:
                              failures += 1
                          latencies.append((time.perf_counter() - t0) * 1000.0)
                  except Exception:
                      failures += 1
                  elapsed = time.perf_counter() - t0
                  if elapsed < interval:
                      time.sleep(interval - elapsed)
              latencies.sort()
              return {"path": path, "n": n,
                      "success": successes, "fail": failures,
                      "p50_ms": pct(latencies, 50),
                      "p95_ms": pct(latencies, 95),
                      "p99_ms": pct(latencies, 99),
                      "max_ms": latencies[-1] if latencies else None}

          if HAS_AIOHTTP:
              async def main():
                  async with aiohttp.ClientSession() as s:
                      await bench_path_aio(s, "/health/ready", WARMUP, RPS)
                      hr = await bench_path_aio(s, "/health/ready", MEASURE, RPS)
                      print(json.dumps({"runs": [hr]}))
              asyncio.run(main())
          else:
              bench_path_urllib("/health/ready", WARMUP, RPS)
              hr = bench_path_urllib("/health/ready", MEASURE, RPS)
              print(json.dumps({"runs": [hr]}))
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "256Mi"
