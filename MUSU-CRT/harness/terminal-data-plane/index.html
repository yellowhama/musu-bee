<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MUSU-CRT Terminal Data Plane Harness</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <p class="eyebrow">MUSU-CRT</p>
        <h1>Terminal Data Plane Harness</h1>
        <p class="muted">data channel ↔ terminal bridge</p>
      </header>

      <section class="layout">
        <article class="panel">
          <h2>Mapping</h2>
          <pre id="mapping-view"></pre>
        </article>
        <article class="panel">
          <h2>Incoming</h2>
          <ul id="incoming-list" class="list"></ul>
        </article>
        <article class="panel">
          <h2>Outgoing</h2>
          <ul id="outgoing-list" class="list"></ul>
        </article>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
  </html>
