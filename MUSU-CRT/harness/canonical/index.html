<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MUSU-CRT Canonical Harness</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page" data-testid="crt-canonical-root">
      <header class="hero">
        <div>
          <p class="eyebrow">MUSU-CRT</p>
          <h1>Canonical Harness</h1>
          <p class="subtitle">Signaling coordinator + local stream controller proof</p>
        </div>
        <div class="hero-status" data-testid="crt-canonical-ready">booting</div>
      </header>

      <section class="summary panel" data-testid="crt-canonical-summary">
        <h2>Smoke Summary</h2>
        <div id="summary" class="summary-grid"></div>
      </section>

      <section class="grid">
        <article class="panel">
          <h2>Signaling State</h2>
          <div id="signaling-state" class="code"></div>
        </article>

        <article class="panel">
          <h2>Local Stream State</h2>
          <div id="stream-state" class="code"></div>
        </article>

        <article class="panel">
          <h2>Remote Session State</h2>
          <div id="remote-state" class="code"></div>
        </article>

        <article class="panel">
          <h2>Lane-2 Remote Operator View</h2>
          <div id="lane2-remote-state" class="code"></div>
        </article>

        <article class="panel">
          <h2>Metrics</h2>
          <div id="metrics" class="metric-grid"></div>
        </article>

        <article class="panel">
          <h2>Timeline</h2>
          <div id="timeline" class="timeline"></div>
        </article>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
  </html>
