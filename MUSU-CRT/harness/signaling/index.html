<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MUSU-CRT Signaling Harness</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <p class="eyebrow">MUSU-CRT</p>
        <h1>Signaling Harness</h1>
        <p class="muted">offer, add_ice, close surface reproduction</p>
      </header>

      <section class="grid">
        <article class="panel">
          <h2>Session</h2>
          <div id="session-card"></div>
        </article>
        <article class="panel">
          <h2>Offer</h2>
          <pre id="offer-view"></pre>
        </article>
        <article class="panel">
          <h2>Answer</h2>
          <pre id="answer-view"></pre>
        </article>
        <article class="panel">
          <h2>ICE Flow</h2>
          <ul id="ice-list" class="list"></ul>
        </article>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
  </html>
