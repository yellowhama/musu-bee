name: E2E Tests — musu-bee

on:
  push:
    branches:
      - main
    paths:
      - 'musu-bee/**'
      - '.github/workflows/e2e-musu-bee.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'musu-bee/**'

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: musu-bee

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: musu-bee/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: musu-bee/playwright-report/
          retention-days: 7
