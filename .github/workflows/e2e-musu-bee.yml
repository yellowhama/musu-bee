name: E2E Tests — musu-bee

on:
  push:
    branches:
      - main
    paths:
      - 'musu-bee/**'
      - '.github/workflows/e2e-musu-bee.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'musu-bee/**'
      - '.github/workflows/e2e-musu-bee.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: musu-bee

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: musu-bee/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run CI E2E smoke
        run: npm run test:e2e:ci
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'http://127.0.0.1:54321' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'public-anon-key-for-ci' }}
          NEXT_PUBLIC_APP_URL: http://localhost:3001
          NEXT_PUBLIC_AUTH_ENABLED: "false"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: musu-bee/playwright-report/
          retention-days: 7
