name: E2E Tests — musu-bee

on:
  push:
    branches:
      - main
    paths:
      - 'musu-bee/**'
      - 'musu-port/**'
      - '.github/workflows/e2e-musu-bee.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'musu-bee/**'
      - 'musu-port/**'
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: musu-bee

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: musu-bee/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: musu-port -> target

      - name: Build musu-portd
        run: cargo build --release -p musu-portd
        working-directory: musu-port
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: cc
          CC: cc
          CXX: c++

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'http://127.0.0.1:54321' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'public-anon-key-for-ci' }}
          NEXT_PUBLIC_APP_URL: http://localhost:3001
          NEXT_PUBLIC_AUTH_ENABLED: "false"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: musu-bee/playwright-report/
          retention-days: 7
