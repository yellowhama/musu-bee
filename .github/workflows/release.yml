name: Release — Build & Publish Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            suffix: linux-x86_64-static
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            suffix: macos-arm64
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            suffix: windows-x86_64
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      - name: Install Linux C dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libxdo-dev libx11-dev libasound2-dev libxcb-shape0-dev libxcb-xfixes0-dev libxcb1-dev libxkbcommon-dev libxcb-randr0-dev libxcb-shm0-dev

      - name: Build musu
        working-directory: musu-rs
        run: |
          cargo build --release --target ${{ matrix.target }} --bin musu

      - name: Package binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp musu-rs/target/${{ matrix.target }}/release/musu dist/musu-${{ matrix.suffix }}
          chmod +x dist/*

      - name: Package binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "musu-rs\target\${{ matrix.target }}\release\musu.exe" "dist\musu-${{ matrix.suffix }}.exe"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: dist/

  release:
    name: Create Release
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
            install.sh
            install.ps1
