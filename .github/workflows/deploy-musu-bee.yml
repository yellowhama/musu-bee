name: Deploy musu-bee to Vercel

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'musu-bee/**'
      - 'VERSION'
      - 'scripts/windows/Install-MUSU.ps1'
      - 'scripts/windows/Uninstall-MUSU.ps1'
      - 'scripts/windows/repair-fleet-node-public-url.ps1'
      - 'scripts/windows/canary-desktop-release.ps1'
      - 'scripts/windows/verify-musu-pro-install-channel.ps1'
      - '.github/workflows/deploy-musu-bee.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'musu-bee/**'
      - 'VERSION'
      - 'scripts/windows/Install-MUSU.ps1'
      - 'scripts/windows/Uninstall-MUSU.ps1'
      - 'scripts/windows/repair-fleet-node-public-url.ps1'
      - 'scripts/windows/canary-desktop-release.ps1'
      - 'scripts/windows/verify-musu-pro-install-channel.ps1'
      - '.github/workflows/deploy-musu-bee.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  VERCEL_CLI_VERSION: "54.7.1"

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: musu-bee/package-lock.json

      - name: Install Vercel CLI
        run: |
          npm install -g "vercel@${VERCEL_CLI_VERSION}"
          vercel --version

      - name: Sync production P2P control-plane env
        if: github.ref == 'refs/heads/main'
        run: |
          node <<'NODE'
          async function main() {
            const envSpec = [
              { key: "MUSU_P2P_CONTROL_TOKEN_SHA256S", value: process.env.MUSU_P2P_CONTROL_TOKEN_SHA256S, type: "sensitive" },
              { key: "KV_REST_API_URL", value: process.env.KV_REST_API_URL, type: "plain" },
              { key: "KV_REST_API_TOKEN", value: process.env.KV_REST_API_TOKEN, type: "sensitive" },
              { key: "UPSTASH_REDIS_REST_URL", value: process.env.UPSTASH_REDIS_REST_URL, type: "plain" },
              { key: "UPSTASH_REDIS_REST_TOKEN", value: process.env.UPSTASH_REDIS_REST_TOKEN, type: "sensitive" },
              { key: "MUSU_P2P_RELAY_ENABLED", value: process.env.MUSU_P2P_RELAY_ENABLED, type: "plain" },
              { key: "MUSU_P2P_RELAY_TRANSPORT_WIRED", value: process.env.MUSU_P2P_RELAY_TRANSPORT_WIRED, type: "plain" },
              { key: "MUSU_P2P_RELAY_URL", value: process.env.MUSU_P2P_RELAY_URL, type: "plain" },
              { key: "MUSU_P2P_RELAY_ENTITLEMENT", value: process.env.MUSU_P2P_RELAY_ENTITLEMENT, type: "sensitive" },
              { key: "MUSU_P2P_RELAY_LEASE_MAX_RECORDS", value: process.env.MUSU_P2P_RELAY_LEASE_MAX_RECORDS, type: "plain" },
              { key: "MUSU_P2P_RELAY_LEASE_TTL_SEC", value: process.env.MUSU_P2P_RELAY_LEASE_TTL_SEC, type: "plain" },
            ];

            const candidates = [];
            for (const item of envSpec) {
              if (typeof item.value === "string" && item.value.trim().length > 0) {
                candidates.push(item);
              } else {
                console.log(`${item.key} is not set; skipping.`);
              }
            }

            if (candidates.length === 0) {
              console.log("No production P2P control-plane env values set; skipping Vercel REST env sync.");
              return;
            }

            const token = process.env.VERCEL_TOKEN;
            const projectId = process.env.VERCEL_PROJECT_ID;
            if (!token) {
              throw new Error("VERCEL_TOKEN is required to sync production P2P control-plane env.");
            }
            if (!projectId) {
              throw new Error("VERCEL_PROJECT_ID is required to sync production P2P control-plane env.");
            }

            const endpoint = new URL(`https://api.vercel.com/v10/projects/${encodeURIComponent(projectId)}/env`);
            endpoint.searchParams.set("upsert", "true");
            if (process.env.VERCEL_ORG_ID) {
              endpoint.searchParams.set("teamId", process.env.VERCEL_ORG_ID);
            }

            let failedCount = 0;
            for (const item of candidates) {
              const response = await fetch(endpoint, {
                method: "POST",
                headers: {
                  "Authorization": `Bearer ${token}`,
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({
                  key: item.key,
                  value: item.value,
                  type: item.type,
                  target: ["production"],
                  comment: "musu.pro production P2P control-plane env synced by deploy-musu-bee.yml",
                }),
              });

              const bodyText = await response.text();
              let body = {};
              if (bodyText) {
                try {
                  body = JSON.parse(bodyText);
                } catch {
                  body = {};
                }
              }
              const failed = Array.isArray(body.failed) ? body.failed : [];
              if (!response.ok || failed.length > 0) {
                const failureSummary = failed
                  .map((entry) => entry && entry.error ? `${entry.error.envVarKey || entry.error.key || item.key}:${entry.error.code || "unknown"}` : `${item.key}:unknown`)
                  .join(", ");
                const suffix = failureSummary ? ` (${failureSummary})` : "";
                console.error(`${item.key} sync failed with HTTP ${response.status}${suffix}.`);
                failedCount += 1;
                continue;
              }

              console.log(`${item.key} synced to Vercel production via REST upsert.`);
            }

            if (failedCount > 0) {
              throw new Error(`${failedCount} Vercel production P2P env sync operation(s) failed.`);
            }
          }

          main().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });
          NODE
        working-directory: musu-bee
        env:
          MUSU_P2P_CONTROL_TOKEN_SHA256S: ${{ secrets.MUSU_P2P_CONTROL_TOKEN_SHA256S }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL || vars.KV_REST_API_URL || secrets.UPSTASH_REDIS_REST_URL || vars.UPSTASH_REDIS_REST_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN || secrets.UPSTASH_REDIS_REST_TOKEN }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL || vars.UPSTASH_REDIS_REST_URL || secrets.KV_REST_API_URL || vars.KV_REST_API_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN || secrets.KV_REST_API_TOKEN }}
          MUSU_P2P_RELAY_ENABLED: ${{ secrets.MUSU_P2P_RELAY_ENABLED || vars.MUSU_P2P_RELAY_ENABLED }}
          MUSU_P2P_RELAY_TRANSPORT_WIRED: ${{ secrets.MUSU_P2P_RELAY_TRANSPORT_WIRED || vars.MUSU_P2P_RELAY_TRANSPORT_WIRED }}
          MUSU_P2P_RELAY_URL: ${{ secrets.MUSU_P2P_RELAY_URL || vars.MUSU_P2P_RELAY_URL }}
          MUSU_P2P_RELAY_ENTITLEMENT: ${{ secrets.MUSU_P2P_RELAY_ENTITLEMENT || vars.MUSU_P2P_RELAY_ENTITLEMENT }}
          MUSU_P2P_RELAY_LEASE_MAX_RECORDS: ${{ secrets.MUSU_P2P_RELAY_LEASE_MAX_RECORDS || vars.MUSU_P2P_RELAY_LEASE_MAX_RECORDS }}
          MUSU_P2P_RELAY_LEASE_TTL_SEC: ${{ secrets.MUSU_P2P_RELAY_LEASE_TTL_SEC || vars.MUSU_P2P_RELAY_LEASE_TTL_SEC }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: musu-bee

      - name: Build project
        run: vercel build ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: musu-bee
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: https://musu.pro
          NEXT_PUBLIC_AUTH_ENABLED: "true"

      - name: Verify production desktop-latest release assets
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        run: ./scripts/windows/canary-desktop-release.ps1 -Json -SkipLocalArtifactLengthChecks

      - name: Deploy to Vercel
        id: deploy
        timeout-minutes: 10
        run: |
          url=$(vercel deploy --prebuilt --yes ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
        working-directory: musu-bee

      - name: Verify production health
        if: github.ref == 'refs/heads/main'
        run: curl -fsS https://musu.pro/api/health

      - name: Verify production install channel
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        run: ./scripts/windows/verify-musu-pro-install-channel.ps1 -Json

      - name: Comment PR preview URL
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview deployed:** ${{ steps.deploy.outputs.url }}`
            })
