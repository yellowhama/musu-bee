name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  web:
    name: Web typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: musu-bee
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: musu-bee/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'http://127.0.0.1:54321' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'public-anon-key-for-ci' }}
          NEXT_PUBLIC_APP_URL: https://musu.pro
          NEXT_PUBLIC_AUTH_ENABLED: "false"

      - name: Typecheck
        run: npm run typecheck

      - name: Route security tests
        run: npm run test:routes

      - name: P2P control-plane tests
        run: npm run test:p2p

  rust:
    name: Rust core tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libegl1-mesa-dev \
            libgbm-dev \
            libgl1-mesa-dev \
            libpipewire-0.3-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-randr0-dev \
            libxcb-shape0-dev \
            libxcb-shm0-dev \
            libxcb-xfixes0-dev \
            libxcb1-dev \
            libxdo-dev \
            libxkbcommon-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: musu-rs -> target

      - name: Cargo test
        run: cargo test --manifest-path musu-rs/Cargo.toml --lib -- --test-threads=1

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - web
      - rust
    if: always()
    steps:
      - name: Verify required jobs
        shell: bash
        run: |
          if [[ "${{ needs.web.result }}" != "success" ]]; then
            echo "web job failed: ${{ needs.web.result }}"
            exit 1
          fi
          if [[ "${{ needs.rust.result }}" != "success" ]]; then
            echo "rust job failed: ${{ needs.rust.result }}"
            exit 1
          fi
