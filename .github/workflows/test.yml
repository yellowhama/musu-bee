name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet -e musu-core/
          .venv/bin/pip install --quiet -e musu-bridge/
          .venv/bin/pip install pytest pytest-asyncio pytest-timeout pytest-cov

      - name: Run musu-core tests
        run: |
          .venv/bin/pytest musu-core/tests/ --timeout=30 -q --tb=short
        env:
          MUSU_BRIDGE_TOKEN: test-ci-token-for-testing

      - name: Run musu-bridge tests with coverage
        run: |
          .venv/bin/pytest musu-bridge/tests/ --timeout=30 -q --tb=short \
            --cov=musu_core --cov-report=term-missing --cov-report=html:coverage-html
        env:
          MUSU_BRIDGE_TOKEN: test-ci-token-for-testing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-html/
