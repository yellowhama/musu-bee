[pytest]
addopts = --import-mode=importlib -m "not perf and not slow"
asyncio_mode = auto
timeout_method = signal
testpaths = musu-bridge/tests musu-core/tests
markers =
    perf: performance-sensitive tests, run manually with -m perf (skipped by default to avoid CI flake on shared hardware)
    slow: slow multiprocessing/integration tests, run manually with -m slow (v19.F.2 added)

# Coverage: run with `pytest --cov` to enable
# Default off to avoid slowing regular test runs
